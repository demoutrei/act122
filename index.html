<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/uspf.png"/>
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample System</title>
  </head>
  <body>
    <header id="topbar">
      <div id="header-yellow">
        <img id="header-icon" src="assets/uspf.png"/>
        <div id="header-title">UNIVERSITY OF SOUTHERN PHILIPPINES FOUNDATION</div>
      </div>
      <div id="header-blue">
        <nav id="topbar-navigation">
          <a class="navigation-item" href="./register">
            <div class="title">SIGN UP</div>
          </a>
        </nav>
      </div>
    </header>
    <main>
      <section>
        <div class="title">Log In</div>
        <div class="form">
          <div class="form-name">Student/Organizer ID</div>
          <input placeholder="User ID" type="text"/>
        </div>
        <div class="form">
          <div class="form-name">Account Password</div>
          <input placeholder="Password" type="password"/>
        </div>
        <button id="button-logIn">Log In</button>
      </section>
    </main>
    <footer>
      <div id="footer-top">
        <img src="assets/uspf.png"/>
        <div id="name">UNIVERSITY OF SOUTHERN PHILIPPINES FOUNDATION</div>
      </div>
    </footer>
  </body>
</html>
