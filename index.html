<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/uspf.png"/>
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample System</title>
  </head>
  <body>
    <header id="headerContent">
      <div id="header-yellow">
        <img id="header-icon" src="assets/uspf.png"/>
        <div id="header-title">UNIVERSITY OF SOUTHERN PHILIPPINES FOUNDATION</div>
      </div>
      <div id="header-blue">
        <nav id="topbar-navigation">
        </nav>
      </div>
    </header>
    <main id="mainContent">
      <section>
        <div id="logIn-types">
          <div class="logIn-type selected" data-type="student">
            <img src="assets/graduate-hat.png">
            <div class="logIn-type-name">Student</div>
          </div>
          <div class="logIn-type" data-type="faculty">
            <img src="assets/staff.png">
            <div class="logIn-type-name">Faculty</div>
          </div>
        </div>
        <div id="logIn-info">
          <div class="title">Log In</div>
          <div class="form">
            <div class="form-name">Account ID</div>
            <input id="logIn-info-accountId" placeholder="Account ID" type="text"/>
          </div>
          <div class="form">
            <div class="form-name">Account Password</div>
            <input id="logIn-info-password" placeholder="Password" type="password"/>
          </div>
          <button disabled id="button-logIn">Log In</button>
        </div>
      </section>
    </main>
    <footer id="footerContent">
      <div id="footer-top">
        <img src="assets/uspf.png"/>
        <div id="name">UNIVERSITY OF SOUTHERN PHILIPPINES FOUNDATION</div>
      </div>
    </footer>
  </body>
  <script src="index.js"></script>
</html>
